services:
  backend:
    build:
      context: ./backend
    container_name: pj-backend
    expose:
      - "5000"
    volumes:
      - datos_procesados:/app/datos_procesados
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
    container_name: pj-dashboard
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  datos_procesados:
